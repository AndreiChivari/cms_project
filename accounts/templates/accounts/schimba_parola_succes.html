{% extends "base.html" %}

{% block title %}Parolă Actualizată{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3 text-center py-4">
                <div class="card-body">
                    <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-check-circle-fill" style="font-size: 2.5rem;"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Parolă modificată cu succes!</h4>
                    <p class="text-muted small mb-4">Contul dumneavoastră este securizat. Puteți folosi noua parolă la următoarea conectare.</p>
                    
                    <a href="{% url 'index' %}" class="btn btn-primary px-4 fw-medium shadow-sm">Înapoi la Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
